<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8">
<title>Radii</title>
<link rel="stylesheet" href="preview.css">
<style>
  .box { width:88px; height:60px; background:#eef2ff; border:1px solid #c7d2fe; display:flex;align-items:center;justify-content:center;color:#4338ca;font-family:var(--font-mono);font-size:12px }
  .cell { display:flex;flex-direction:column;align-items:center;gap:6px }
</style>
</head><body>
<div class="card-frame">
  <div class="row" style="gap:18px;justify-content:flex-start;flex-wrap:wrap">
    <div class="cell"><div class="box" style="border-radius:4px">4</div><div class="token-name">sm</div><div class="token-value">4px · badges</div></div>
    <div class="cell"><div class="box" style="border-radius:8px">8</div><div class="token-name">md</div><div class="token-value">8px · buttons</div></div>
    <div class="cell"><div class="box" style="border-radius:12px">12</div><div class="token-name">lg</div><div class="token-value">12px · cards</div></div>
    <div class="cell"><div class="box" style="border-radius:16px">16</div><div class="token-name">xl</div><div class="token-value">16px · dropzone</div></div>
    <div class="cell"><div class="box" style="border-radius:999px">999</div><div class="token-name">pill</div><div class="token-value">type badges</div></div>
  </div>
</div>
</body></html>
