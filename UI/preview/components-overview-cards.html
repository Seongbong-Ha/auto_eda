<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8">
<title>Overview cards</title>
<link rel="stylesheet" href="preview.css">
<style>
  body { background:#fafafa }
  .stat { background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px 18px;box-shadow:0 1px 2px rgba(17,24,39,0.04);display:flex;flex-direction:column;gap:6px }
  .stat-label { font-size:12px;font-weight:500;color:#6b7280;text-transform:uppercase;letter-spacing:0.04em }
  .stat-value { font-size:24px;font-weight:600;letter-spacing:-0.01em;font-variant-numeric:tabular-nums;color:#111827 }
  .stat-sub { font-size:12px;color:#9ca3af;font-family:var(--font-mono) }
</style>
</head><body>
<div class="card-frame">
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px">
    <div class="stat">
      <div class="stat-label">행 수</div>
      <div class="stat-value">12,489</div>
      <div class="stat-sub">rows</div>
    </div>
    <div class="stat">
      <div class="stat-label">열 수</div>
      <div class="stat-value">18</div>
      <div class="stat-sub">columns</div>
    </div>
    <div class="stat">
      <div class="stat-label">결측률</div>
      <div class="stat-value">3.2%</div>
      <div class="stat-sub">missing_rate</div>
    </div>
    <div class="stat">
      <div class="stat-label">용량</div>
      <div class="stat-value">2.4 MB</div>
      <div class="stat-sub">memory_mb</div>
    </div>
  </div>
</div>
</body></html>
