<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8">
<title>Type — Family</title>
<link rel="stylesheet" href="preview.css">
</head><body>
<div class="card-frame">
  <div class="col" style="gap:2px">
    <div style="font-size:34px;font-weight:700;letter-spacing:-0.02em;line-height:1.1">데이터 한 번에 읽기</div>
    <div style="font-size:22px;font-weight:500;color:var(--color-fg-muted);letter-spacing:-0.01em">Pretendard · system stack with Korean priority</div>
  </div>
  <div class="row between" style="margin-top:6px">
    <div class="col" style="gap:2px">
      <div style="font-size:13px;color:var(--color-fg-subtle);text-transform:uppercase;letter-spacing:0.04em">primary</div>
      <div style="font-size:15px;color:var(--color-fg);font-weight:400">Pretendard Variable</div>
    </div>
    <div class="col" style="gap:2px">
      <div style="font-size:13px;color:var(--color-fg-subtle);text-transform:uppercase;letter-spacing:0.04em">fallback</div>
      <div style="font-size:15px;color:var(--color-fg-muted)">Apple SD Gothic Neo → Noto Sans KR → Malgun Gothic</div>
    </div>
    <div class="col" style="gap:2px">
      <div style="font-size:13px;color:var(--color-fg-subtle);text-transform:uppercase;letter-spacing:0.04em">mono</div>
      <div style="font-family:var(--font-mono);font-size:15px;color:var(--color-fg)">JetBrains Mono</div>
    </div>
  </div>
</div>
</body></html>
