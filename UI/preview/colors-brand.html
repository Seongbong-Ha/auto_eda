<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8">
<title>Colors — Brand (Indigo)</title>
<link rel="stylesheet" href="preview.css">
<style>
  .swatch { height: 72px; border-radius: 10px; border: 1px solid rgba(17,24,39,0.04); display:flex;align-items:flex-end;padding:10px;color:#fff;font-family:var(--font-mono);font-size:11px}
  .swatch.light { color: #1e1b4b }
</style>
</head><body>
<div class="card-frame">
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px">
    <div>
      <div class="swatch light" style="background:#eef2ff">soft</div>
      <div class="token-name" style="margin-top:6px">brand-soft</div>
      <div class="token-value">#eef2ff</div>
    </div>
    <div>
      <div class="swatch" style="background:#4f46e5">600</div>
      <div class="token-name" style="margin-top:6px">brand</div>
      <div class="token-value">#4f46e5</div>
    </div>
    <div>
      <div class="swatch" style="background:#4338ca">700</div>
      <div class="token-name" style="margin-top:6px">brand-hover</div>
      <div class="token-value">#4338ca</div>
    </div>
    <div>
      <div class="swatch" style="background:#3730a3">800</div>
      <div class="token-name" style="margin-top:6px">brand-active</div>
      <div class="token-value">#3730a3</div>
    </div>
    <div>
      <div class="swatch light" style="background:#ffffff;border:1px solid #e5e7eb;box-shadow:0 0 0 3px rgba(79,70,229,0.18) inset">ring</div>
      <div class="token-name" style="margin-top:6px">brand-ring</div>
      <div class="token-value">rgba(79,70,229,.18)</div>
    </div>
  </div>
  <div class="row" style="gap:10px;margin-top:6px">
    <button style="background:#4f46e5;color:#fff;border:0;border-radius:8px;padding:10px 16px;font-family:inherit;font-size:14px;font-weight:600">분석 시작</button>
    <button style="background:#4338ca;color:#fff;border:0;border-radius:8px;padding:10px 16px;font-family:inherit;font-size:14px;font-weight:600">hover</button>
    <button style="background:#3730a3;color:#fff;border:0;border-radius:8px;padding:10px 16px;font-family:inherit;font-size:14px;font-weight:600;transform:translateY(1px)">press</button>
    <button style="background:#4f46e5;color:#fff;border:0;border-radius:8px;padding:10px 16px;font-family:inherit;font-size:14px;font-weight:600;box-shadow:0 0 0 3px rgba(79,70,229,0.32)">focus</button>
  </div>
</div>
</body></html>
