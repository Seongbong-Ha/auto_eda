<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8">
<title>Step indicator</title>
<link rel="stylesheet" href="preview.css">
<style>
  body { background:#fafafa }
  .steps { display:flex;align-items:center;gap:14px;background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:18px 22px;box-shadow:0 1px 2px rgba(17,24,39,0.04) }
  .step { display:flex;align-items:center;gap:10px }
  .dot { width:22px;height:22px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;flex:none }
  .done   { background:#4f46e5;color:#fff }
  .active { background:#eef2ff;border:1px solid #c7d2fe }
  .idle   { background:#fff;border:1px solid #d1d5db }
  .label-step { font-size:14px;color:#4b5563 }
  .label-step.is-active { color:#3730a3;font-weight:600 }
  .label-step.is-done   { color:#111827;font-weight:500 }
  .sep { width:24px;height:1px;background:#d1d5db;flex:none }
  .spinner { width:12px;height:12px;border:1.5px solid #c7d2fe;border-top-color:#4f46e5;border-radius:999px;animation:spin 1s linear infinite }
  @keyframes spin { to { transform:rotate(360deg) } }
</style>
</head><body>
<div class="card-frame">
  <div class="steps">
    <div class="step">
      <span class="dot done">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </span>
      <span class="label-step is-done">업로드</span>
    </div>
    <div class="sep"></div>
    <div class="step">
      <span class="dot active"><span class="spinner"></span></span>
      <span class="label-step is-active">통계 계산</span>
    </div>
    <div class="sep"></div>
    <div class="step">
      <span class="dot idle"></span>
      <span class="label-step">AI 분석</span>
    </div>
    <div style="flex:1"></div>
    <div style="font-size:13px;color:#6b7280">Claude가 데이터를 분석하고 있습니다…</div>
  </div>
</div>
</body></html>
