<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8">
<title>Colors — Neutrals</title>
<link rel="stylesheet" href="preview.css">
<style>
  .swatch { width: 100%; height: 56px; border-radius: 8px; border: 1px solid var(--color-border); }
  .cell   { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
</style>
</head><body>
<div class="card-frame">
  <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:14px">
    <div class="cell"><div class="swatch" style="background:#ffffff"></div><div class="token-name">bg</div><div class="token-value">#ffffff</div></div>
    <div class="cell"><div class="swatch" style="background:#fafafa"></div><div class="token-name">surface-alt</div><div class="token-value">#fafafa</div></div>
    <div class="cell"><div class="swatch" style="background:#f5f5f7"></div><div class="token-name">surface-sunk</div><div class="token-value">#f5f5f7</div></div>
    <div class="cell"><div class="swatch" style="background:#e5e7eb;border-color:#e5e7eb"></div><div class="token-name">border</div><div class="token-value">#e5e7eb</div></div>
    <div class="cell"><div class="swatch" style="background:#d1d5db;border-color:#d1d5db"></div><div class="token-name">border-strong</div><div class="token-value">#d1d5db</div></div>
    <div class="cell"><div class="swatch" style="background:#cbd5e1;border-color:#cbd5e1"></div><div class="token-name">border-dashed</div><div class="token-value">#cbd5e1</div></div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:6px">
    <div class="cell"><div class="swatch" style="background:#111827;border-color:#111827"></div><div class="token-name">fg</div><div class="token-value">#111827</div></div>
    <div class="cell"><div class="swatch" style="background:#4b5563;border-color:#4b5563"></div><div class="token-name">fg-muted</div><div class="token-value">#4b5563</div></div>
    <div class="cell"><div class="swatch" style="background:#6b7280;border-color:#6b7280"></div><div class="token-name">fg-subtle</div><div class="token-value">#6b7280</div></div>
    <div class="cell"><div class="swatch" style="background:#9ca3af;border-color:#9ca3af"></div><div class="token-name">fg-faint</div><div class="token-value">#9ca3af</div></div>
  </div>
</div>
</body></html>
