<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8">
<title>Shadows</title>
<link rel="stylesheet" href="preview.css">
<style>
  body { background:#fafafa }
  .card-frame { background: transparent }
  .box { width: 160px; height: 80px; background:#fff; border:1px solid #e5e7eb; border-radius:12px; display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:12px;color:#6b7280 }
  .cell { display:flex;flex-direction:column;gap:8px;align-items:flex-start }
</style>
</head><body>
<div class="card-frame">
  <div class="row" style="gap:24px;align-items:flex-start">
    <div class="cell">
      <div class="box" style="box-shadow:0 1px 2px rgba(17,24,39,0.04)">resting</div>
      <div class="token-name">shadow-sm</div>
      <div class="token-value">0 1px 2px rgba(17,24,39,.04)</div>
    </div>
    <div class="cell">
      <div class="box" style="box-shadow:0 2px 8px rgba(17,24,39,0.06)">interactive</div>
      <div class="token-name">shadow-md</div>
      <div class="token-value">0 2px 8px rgba(17,24,39,.06)</div>
    </div>
    <div class="cell">
      <div class="box" style="box-shadow:0 8px 24px rgba(17,24,39,0.08)">modal</div>
      <div class="token-name">shadow-lg</div>
      <div class="token-value">0 8px 24px rgba(17,24,39,.08)</div>
    </div>
  </div>
</div>
</body></html>
