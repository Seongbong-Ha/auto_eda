<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8">
<title>Brand — Voice</title>
<link rel="stylesheet" href="preview.css">
<style>
  body { background:#fafafa }
  .vbox { background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px 20px;flex:1 }
  .yes { color:#15803d;font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:0.04em }
  .no  { color:#dc2626;font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:0.04em }
  .ex  { font-size:15px;color:#111827;margin-top:6px }
  .meta{ font-size:12px;color:#9ca3af;margin-top:8px }
</style>
</head><body>
<div class="card-frame">
  <div class="row" style="gap:14px;align-items:stretch">
    <div class="vbox">
      <div class="yes">DO</div>
      <div class="ex">Claude가 데이터를 분석하고 있습니다…</div>
      <div class="meta">declarative · present continuous · ellipsis suggests patience</div>
    </div>
    <div class="vbox">
      <div class="no">DON'T</div>
      <div class="ex" style="color:#9ca3af">분석 시작하기! 🚀</div>
      <div class="meta">exclamation, emoji, marketing voice — all off-brand</div>
    </div>
  </div>
  <div class="row" style="gap:14px;align-items:stretch">
    <div class="vbox">
      <div class="yes">DO</div>
      <div class="ex">분석 시작</div>
      <div class="meta">verb phrase · sentence case · no period</div>
    </div>
    <div class="vbox">
      <div class="no">DON'T</div>
      <div class="ex" style="color:#9ca3af">당신의 데이터를 지금 분석해보세요.</div>
      <div class="meta">addresses user · over-friendly · sells instead of describes</div>
    </div>
  </div>
</div>
</body></html>
