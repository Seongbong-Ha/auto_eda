<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8">
<title>Type — Mono &amp; Numerals</title>
<link rel="stylesheet" href="preview.css">
</head><body>
<div class="card-frame">
  <div class="col" style="gap:6px">
    <div class="token-name">tabular-nums · used in tables &amp; overview cards</div>
    <table style="font-family:var(--font-mono);font-size:15px;border-collapse:collapse;font-variant-numeric:tabular-nums">
      <tr><td style="padding:2px 16px 2px 0;color:var(--color-fg-muted)">min</td><td style="padding:2px 0;text-align:right">  12.4</td><td style="padding:2px 0 2px 24px;text-align:right">1,234</td><td style="padding:2px 0 2px 24px;text-align:right">  0.032</td></tr>
      <tr><td style="padding:2px 16px 2px 0;color:var(--color-fg-muted)">max</td><td style="padding:2px 0;text-align:right">9,812.0</td><td style="padding:2px 0 2px 24px;text-align:right">   89</td><td style="padding:2px 0 2px 24px;text-align:right">  1.000</td></tr>
      <tr><td style="padding:2px 16px 2px 0;color:var(--color-fg-muted)">mean</td><td style="padding:2px 0;text-align:right">  847.3</td><td style="padding:2px 0 2px 24px;text-align:right">  611</td><td style="padding:2px 0 2px 24px;text-align:right">  0.412</td></tr>
    </table>
  </div>
  <div class="col" style="gap:4px;margin-top:4px">
    <div class="token-name">code · JetBrains Mono / D2Coding · 13–15px</div>
    <code style="background:var(--color-surface-sunk);padding:8px 12px;border-radius:6px;font-family:var(--font-mono);font-size:13px;color:var(--color-fg);display:inline-block;width:fit-content">df.memory_usage(deep=True).sum() / 1024 / 1024</code>
  </div>
</div>
</body></html>
