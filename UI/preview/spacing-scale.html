<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8">
<title>Spacing — Scale</title>
<link rel="stylesheet" href="preview.css">
<style>
  .bar { background:#4f46e5; height:12px; border-radius:2px }
  .row-s { display:grid; grid-template-columns: 80px 1fr 80px; align-items:center; gap:16px }
</style>
</head><body>
<div class="card-frame">
  <div class="col" style="gap:8px">
    <div class="row-s"><div class="token-name">space-1</div><div><div class="bar" style="width:4px"></div></div><div class="token-value">4px</div></div>
    <div class="row-s"><div class="token-name">space-2</div><div><div class="bar" style="width:8px"></div></div><div class="token-value">8px</div></div>
    <div class="row-s"><div class="token-name">space-3</div><div><div class="bar" style="width:12px"></div></div><div class="token-value">12px</div></div>
    <div class="row-s"><div class="token-name">space-4</div><div><div class="bar" style="width:16px"></div></div><div class="token-value">16px</div></div>
    <div class="row-s"><div class="token-name">space-6</div><div><div class="bar" style="width:24px"></div></div><div class="token-value">24px</div></div>
    <div class="row-s"><div class="token-name">space-8</div><div><div class="bar" style="width:32px"></div></div><div class="token-value">32px</div></div>
    <div class="row-s"><div class="token-name">space-12</div><div><div class="bar" style="width:48px"></div></div><div class="token-value">48px</div></div>
    <div class="row-s"><div class="token-name">space-16</div><div><div class="bar" style="width:64px"></div></div><div class="token-value">64px</div></div>
  </div>
</div>
</body></html>
